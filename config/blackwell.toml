# Tuned for NVIDIA Blackwell B200/B100 (80-192 GB VRAM)

[pipeline]
device = "cuda:0"
ocr_backend = "torch"
ocr_batch_size = 64
layout_batch_size = 64
table_batch_size = 64
document_timeout = 180.0

[workers]
num_gpus = 0       # auto-detect
workers_per_gpu = 8

[batch]
doc_batch_size = 1
page_batch_size = 16
